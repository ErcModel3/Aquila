set / interface lag103 admin-state enable
set / interface lag103 lag lag-type lacp
set / interface lag103 lag min-links 1
set / interface lag103 lag lacp interval FAST
set / interface lag103 lag lacp lacp-mode ACTIVE

set / interface lo0 admin-state enable
set / interface lo0 subinterface 1 admin-state enable
set / interface lo0 subinterface 1 ipv4 admin-state enable
set / interface lo0 subinterface 1 ipv4 address 10.0.0.3/32
set / network-instance default interface lo0.1
set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lo0.1
set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lo0.1 passive true

set / interface ethernet-1/11 admin-state enable
set / interface ethernet-1/11 ethernet aggregate-id lag103
set / interface ethernet-1/11 ethernet port-speed 25G
set / interface ethernet-1/11 description ISL-leaf1-eth-1/11
set / interface ethernet-1/12 admin-state enable
set / interface ethernet-1/12 ethernet aggregate-id lag103
set / interface ethernet-1/12 ethernet port-speed 25G
set / interface ethernet-1/12 description ISL-leaf1-eth-1/12

set / interface lag103 subinterface 1 admin-state enable
set / interface lag103 subinterface 1 ipv4 admin-state enable
set / interface lag103 subinterface 1 ipv4 address 172.16.10.3/31

set / network-instance default interface lag103.1

set / network-instance default protocols ospf instance aquila admin-state enable
set / network-instance default protocols ospf instance aquila version ospf-v2
set / network-instance default protocols ospf instance aquila router-id 0.0.0.3
set / network-instance default protocols ospf instance aquila area 0.0.0.0

set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lag103.1