set / interface lag102 admin-state enable
set / interface lag102 lag lag-type lacp
set / interface lag102 lag min-links 1
set / interface lag102 lag lacp interval FAST
set / interface lag102 lag lacp lacp-mode ACTIVE

set / interface lo0 admin-state enable
set / interface lo0 subinterface 1 admin-state enable
set / interface lo0 subinterface 1 ipv4 admin-state enable
set / interface lo0 subinterface 1 ipv4 address 10.0.0.2/32
set / network-instance default interface lo0.1
set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lo0.1
set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lo0.1 passive true

set / interface ethernet-1/9 admin-state enable
set / interface ethernet-1/9 ethernet aggregate-id lag102
set / interface ethernet-1/9 ethernet port-speed 25G
set / interface ethernet-1/9 description ISL-leaf1-eth-1/9
set / interface ethernet-1/10 admin-state enable
set / interface ethernet-1/10 ethernet aggregate-id lag102
set / interface ethernet-1/10 ethernet port-speed 25G
set / interface ethernet-1/10 description ISL-leaf1-eth-1/10

set / interface lag102 subinterface 1 admin-state enable
set / interface lag102 subinterface 1 ipv4 admin-state enable
set / interface lag102 subinterface 1 ipv4 address 172.16.10.1/31

set / network-instance default interface lag102.1

set / network-instance default protocols ospf instance aquila admin-state enable
set / network-instance default protocols ospf instance aquila version ospf-v2
set / network-instance default protocols ospf instance aquila router-id 0.0.0.2
set / network-instance default protocols ospf instance aquila area 0.0.0.0

set / network-instance default protocols ospf instance aquila area 0.0.0.0 interface lag102.1