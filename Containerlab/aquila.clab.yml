name: aquila

mgmt:
  network: aquila-mgmt
  ipv4-subnet: 192.168.10.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux
      type: ixr-d3
    linux:
      image: rubydelusion/aquila:probe-latest

  nodes:
    # Leaves
    leaf1:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.254
      group: site1
    leaf2:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.253
      group: site2
    leaf3:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.252
      group: site3
    leaf4:
      kind: nokia_srlinux
      mgmt-ipv4: 192.168.10.251
      group: site4

    # Probes
    probe-leaf1:
      kind: linux
      mgmt-ipv4: 192.168.10.5
      group: site1
    probe-leaf2:
      kind: linux
      mgmt-ipv4: 192.168.10.6
      group: site2
    probe-leaf3:
      kind: linux
      mgmt-ipv4: 192.168.10.7
      group: site3
    probe-leaf4:
      kind: linux
      mgmt-ipv4: 192.168.10.8
      group: site4

    # Orchestrator
    orchestrator:
      kind: linux
      mgmt-ipv4: 192.168.10.4
      group: servers

  links:
    # Inter-Leaf links
    - endpoints: [ "leaf1:ethernet-1/9", "leaf2:ethernet-1/9" ]
    - endpoints: [ "leaf1:ethernet-1/10", "leaf2:ethernet-1/10" ]
    - endpoints: [ "leaf1:ethernet-1/11", "leaf3:ethernet-1/11" ]
    - endpoints: [ "leaf1:ethernet-1/12", "leaf3:ethernet-1/12" ]
    - endpoints: [ "leaf2:ethernet-1/11", "leaf4:ethernet-1/11" ]
    - endpoints: [ "leaf2:ethernet-1/12", "leaf4:ethernet-1/12" ]
    - endpoints: [ "leaf3:ethernet-1/9", "leaf4:ethernet-1/9" ]
    - endpoints: [ "leaf3:ethernet-1/10", "leaf4:ethernet-1/10" ]

    # Leaf-Probe links
    - endpoints: [ "probe-leaf1:eth1", "leaf1:ethernet-1/1" ]
    - endpoints: [ "probe-leaf2:eth1", "leaf2:ethernet-1/1" ]
    - endpoints: [ "probe-leaf3:eth1", "leaf3:ethernet-1/1" ]
    - endpoints: [ "probe-leaf4:eth1", "leaf4:ethernet-1/1" ]

    # Orchestrator-Probe links
    - endpoints: [ "orchestrator:eth1", "probe-leaf1:eth2" ]
    - endpoints: [ "orchestrator:eth2", "probe-leaf2:eth2" ]
    - endpoints: [ "orchestrator:eth3", "probe-leaf3:eth2" ]
    - endpoints: [ "orchestrator:eth4", "probe-leaf4:eth2" ]
