name: aquila

mgmt:
  network: aquila-mgmt
  ipv4-subnet: 192.168.10.0/24

topology:
  kinds:
    juniper_vjunosswitch:
      image: vrnetlab/juniper_vjunos-switch:25.4R1.12
    linux:
      image: ubuntu:24.04

  nodes:
    # Leaves
    leaf1:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 192.168.10.10
    leaf2:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 192.168.10.20

    # Probes
    probe-leaf1:
      kind: linux
      mgmt-ipv4: 192.168.10.5
    probe-leaf2:
      kind: linux
      mgmt-ipv4: 192.168.10.6

    # Orchestrator
    orchestrator:
      kind: linux
      mgmt-ipv4: 192.168.10.4

  links:
    # Inter-Leaf links
    - endpoints: ["leaf1:eth9", "leaf2:eth9"]
    - endpoints: ["leaf1:eth10", "leaf2:eth10"]

    # Leaf-Probe links
    - endpoints: ["probe-leaf1:eth2", "leaf1:eth1"]
    - endpoints: ["probe-leaf2:eth2", "leaf2:eth1"]

    # Orchestrator-Probe links
    - endpoints: ["orchestrator:eth1", "probe-leaf1:eth1"]
    - endpoints: ["orchestrator:eth2", "probe-leaf2:eth1"]
