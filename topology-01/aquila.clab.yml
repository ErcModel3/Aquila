name: aquila-base

mgmt:
  network: mgmt_network
  ipv4-subnet: 172.20.0.0/24
  
topology:
  nodes:
    switch1-xx1:
      group: switches
      kind: nokia_srlinux
      type: ixrd5
      image: ghcr.io/nokia/srlinux
      mgmt-ipv4: 172.20.0.10
    switch2-xx1:
      group: switches
      kind: nokia_srlinux
      type: ixrd5
      image: ghcr.io/nokia/srlinux
      mgmt-ipv4: 172.20.0.11

  links:
    - endpoints: ["switch1-xx1:ethernet-1/1","switch2-xx1:ethernet-1/1"]